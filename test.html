<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Site</title>
</head>
<body>

  <!-- 
    PAGE LOAD SOUND
    ===============
    The <audio> element loads your MP3 but doesn't play it yet.
    'preload="auto"' tells the browser to load the file immediately.
  -->
  <audio id="page-sound" src="sounds/page-turn.mp3" preload="auto"></audio>

  <!-- 
    CLICKABLE IMAGES
    ================
    Each image has:
      - a normal <img> tag
      - a data-sound attribute pointing to its unique MP3
      - onclick calling playSound() with 'this' (the clicked element)
  -->
  <img
    src="images/site/nav1.jpg"
    alt="Description of photo 1"
    data-sound="audio/hello.mp3"
    onclick="playSound(this)"
    style="cursor: pointer;"
  />

  <img
    src="images/photo2.jpg"
    alt="Description of photo 2"
    data-sound="sounds/sound2.mp3"
    onclick="playSound(this)"
    style="cursor: pointer;"
  />

  <img
    src="images/photo3.jpg"
    alt="Description of photo 3"
    data-sound="sounds/sound3.mp3"
    onclick="playSound(this)"
    style="cursor: pointer;"
  />


  <script>
    // -------------------------------------------------------
    // PAGE LOAD SOUND
    // -------------------------------------------------------

    // OPTION A — Play immediately on load.
    // This WILL be blocked by most browsers on first visit
    // unless the user has interacted with your site before.
    window.addEventListener('load', function () {
      document.getElementById('page-sound').play();
    });


    // OPTION B — Play on the first user interaction (recommended).
    // Comment out Option A and uncomment this block instead.
    // It listens for any click anywhere on the page, plays the
    // sound once, then removes itself so it doesn't fire again.
    /*
    document.addEventListener('click', function playOnFirstInteraction() {
      document.getElementById('page-sound').play();
      document.removeEventListener('click', playOnFirstInteraction);
    }, { once: true });
    */


    // -------------------------------------------------------
    // CLICK SOUNDS FOR IMAGES
    // -------------------------------------------------------

    // This function is called when an image is clicked.
    // 'imgElement' is the <img> that was clicked.
    function playSound(imgElement) {

      // Read the sound file path from the data-sound attribute
      var soundSrc = imgElement.getAttribute('data-sound');

      // Create a new Audio object with that path and play it.
      // Using 'new Audio()' each time means sounds can overlap
      // if you click quickly — each click gets its own instance.
      var sound = new Audio(soundSrc);
      sound.play();
    }
  </script>

</body>
</html>
